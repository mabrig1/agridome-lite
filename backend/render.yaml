services:
  - type: web
    name: agridome-lite-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://agridome-lite.vercel.app
    healthCheckPath: /health
    plan: free
